<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeatherNow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky-deep:    #0a0f1e;
      --sky-accent:  #1a3a6b;
      --glow:        #4fa3e8;
      --glow-soft:   rgba(79,163,232,0.15);
      --text-main:   #e8f4ff;
      --text-muted:  #7ba8cc;
      --card-bg:     rgba(255,255,255,0.05);
      --card-border: rgba(79,163,232,0.2);
      --error:       #ff6b6b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--sky-deep);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(79,163,232,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 30% at 80% 80%, rgba(26,58,107,0.4) 0%, transparent 60%);
    }

    header { text-align: center; margin-bottom: 2.2rem; }
    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    header h1 span { color: var(--glow); }
    header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem; }

    .search-wrap {
      display: flex;
      gap: 0.6rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 1rem;
    }
    .search-wrap input {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 0.75rem 1.1rem;
      color: var(--text-main);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--glow); }

    .btn {
      background: var(--glow);
      color: #0a0f1e;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.2rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .location-row {
      margin-bottom: 1.8rem;
    }
    .location-row button {
      background: none;
      border: none;
      color: var(--glow);
      font-size: 0.88rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    .location-row button:hover { opacity: 0.75; }

    #main-card {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      display: none;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .city-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.1rem;
    }
    .country-date {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 1.4rem;
    }

    .current-weather {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .weather-icon { font-size: 4.5rem; line-height: 1; }
    .temp-main {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.2rem;
      font-weight: 700;
      line-height: 1;
    }
    .temp-unit { font-size: 1.4rem; color: var(--glow); }
    .weather-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 0.2rem;
    }

    .unit-toggle {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .unit-toggle button {
      background: none;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-muted);
      padding: 0.3rem 0.7rem;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .unit-toggle button.active {
      background: var(--glow);
      color: #0a0f1e;
      border-color: var(--glow);
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.8rem;
    }
    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(79,163,232,0.12);
      border-radius: 14px;
      padding: 0.9rem 0.75rem;
      text-align: center;
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .forecast-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }
    .forecast-list {
      display: flex;
      gap: 0.6rem;
      overflow-x: auto;
      padding-bottom: 0.3rem;
      scrollbar-width: none;
    }
    .forecast-list::-webkit-scrollbar { display: none; }
    .forecast-day {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(79,163,232,0.12);
      border-radius: 14px;
      padding: 0.8rem 0.7rem;
      text-align: center;
      min-width: 72px;
    }
    .fc-day-name { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.4rem; }
    .fc-icon { font-size: 1.6rem; margin-bottom: 0.4rem; }
    .fc-temp { font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 600; }
    .fc-temp-low { font-size: 0.78rem; color: var(--text-muted); }

    #error-msg {
      color: var(--error);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
      max-width: 480px;
      text-align: center;
    }
    #loader { display: none; margin: 1.5rem 0; text-align: center; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--glow-soft);
      border-top-color: var(--glow);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      line-height: 1.7;
      max-width: 480px;
    }

    @media (max-width: 420px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Weather<span>Now</span></h1>
    <p>Current conditions &amp; 7-day forecast · No API key needed</p>
  </header>

  <div class="search-wrap">
    <input type="text" id="city-input" placeholder="Search city…" />
    <button class="btn" onclick="searchCity()">Search</button>
  </div>

  <div class="location-row">
    <button onclick="detectLocation()">📍 Use my location</button>
  </div>

  <div id="loader"><div class="spinner"></div></div>
  <p id="error-msg"></p>

  <div id="main-card">
    <div class="city-name" id="city-display"></div>
    <div class="country-date" id="date-display"></div>

    <div class="current-weather">
      <div class="weather-icon" id="weather-icon"></div>
      <div>
        <div class="temp-main">
          <span id="temp-val">--</span><span class="temp-unit" id="temp-unit-sym">°C</span>
        </div>
        <div class="weather-desc" id="weather-desc"></div>
      </div>
    </div>

    <div class="unit-toggle">
      <button id="btn-c" class="active" onclick="setUnit('C')">°C</button>
      <button id="btn-f" onclick="setUnit('F')">°F</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Feels Like</div>
        <div class="stat-value" id="feels-like">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="wind">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pressure</div>
        <div class="stat-value" id="pressure">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">UV Index</div>
        <div class="stat-value" id="uv-index">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rain (1h)</div>
        <div class="stat-value" id="rain">--</div>
      </div>
    </div>

    <div class="forecast-title">7-Day Forecast</div>
    <div class="forecast-list" id="forecast-list"></div>
  </div>

  <footer>
    © 2025 R Navesh<br>
    Vel Tech High Tech Dr. Rangarajan Dr. Sakunthala Engineering College<br>
    B.Tech – Artificial Intelligence &amp; Data Science
  </footer>

<script>
  // ── Open-Meteo: 100% free, no API key ──
  const GEO_URL     = 'https://geocoding-api.open-meteo.com/v1/search';
  const WEATHER_URL = 'https://api.open-meteo.com/v1/forecast';

  let currentUnit = 'C';
  let weatherData = null; // { current, daily, cityName }

  // WMO weather code → emoji + description
  function wmoInfo(code) {
    const map = {
      0:  { e: '☀️',  d: 'Clear sky' },
      1:  { e: '🌤️', d: 'Mainly clear' },
      2:  { e: '⛅',  d: 'Partly cloudy' },
      3:  { e: '☁️',  d: 'Overcast' },
      45: { e: '🌫️', d: 'Foggy' },
      48: { e: '🌫️', d: 'Icy fog' },
      51: { e: '🌦️', d: 'Light drizzle' },
      53: { e: '🌦️', d: 'Drizzle' },
      55: { e: '🌧️', d: 'Heavy drizzle' },
      61: { e: '🌧️', d: 'Light rain' },
      63: { e: '🌧️', d: 'Rain' },
      65: { e: '🌧️', d: 'Heavy rain' },
      71: { e: '🌨️', d: 'Light snow' },
      73: { e: '❄️',  d: 'Snow' },
      75: { e: '❄️',  d: 'Heavy snow' },
      80: { e: '🌦️', d: 'Rain showers' },
      81: { e: '🌧️', d: 'Heavy showers' },
      95: { e: '⛈️',  d: 'Thunderstorm' },
      96: { e: '⛈️',  d: 'Thunderstorm + hail' },
      99: { e: '⛈️',  d: 'Heavy thunderstorm' },
    };
    return map[code] || { e: '🌡️', d: 'Unknown' };
  }

  function cToF(c) { return Math.round(c * 9/5 + 32); }
  function displayTemp(c) {
    return currentUnit === 'C' ? Math.round(c) : cToF(c);
  }
  function unitSym() { return currentUnit === 'C' ? '°C' : '°F'; }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError() { document.getElementById('error-msg').style.display = 'none'; }
  function showLoader(v) { document.getElementById('loader').style.display = v ? 'block' : 'none'; }
  function showCard(v)   { document.getElementById('main-card').style.display = v ? 'block' : 'none'; }

  async function fetchWeather(lat, lon, cityName) {
    showLoader(true); clearError(); showCard(false);
    try {
      const params = new URLSearchParams({
        latitude: lat,
        longitude: lon,
        current: [
          'temperature_2m','apparent_temperature','relative_humidity_2m',
          'wind_speed_10m','surface_pressure','weathercode','precipitation','uv_index'
        ].join(','),
        daily: [
          'weathercode','temperature_2m_max','temperature_2m_min'
        ].join(','),
        timezone: 'auto',
        forecast_days: 7
      });

      const res  = await fetch(`${WEATHER_URL}?${params}`);
      const data = await res.json();

      weatherData = { current: data.current, daily: data.daily, cityName };
      renderAll();
    } catch(e) {
      showError('Could not fetch weather data. Please try again.');
    } finally { showLoader(false); }
  }

  async function searchCity() {
    const val = document.getElementById('city-input').value.trim();
    if (!val) return;
    showLoader(true); clearError(); showCard(false);
    try {
      const res  = await fetch(`${GEO_URL}?name=${encodeURIComponent(val)}&count=1&language=en&format=json`);
      const data = await res.json();
      if (!data.results || data.results.length === 0) throw new Error('City not found');
      const { latitude, longitude, name, country } = data.results[0];
      showLoader(false);
      await fetchWeather(latitude, longitude, `${name}, ${country}`);
    } catch(e) {
      showLoader(false);
      showError(e.message || 'City not found. Try another name.');
    }
  }

  function detectLocation() {
    if (!navigator.geolocation) { showError('Geolocation not supported by your browser.'); return; }
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const { latitude, longitude } = pos.coords;
        // Reverse geocode using Open-Meteo geocoding
        try {
          const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
          const data = await res.json();
          const city = data.address.city || data.address.town || data.address.village || 'Your Location';
          const country = data.address.country_code?.toUpperCase() || '';
          await fetchWeather(latitude, longitude, `${city}, ${country}`);
        } catch {
          await fetchWeather(latitude, longitude, 'Your Location');
        }
      },
      () => showError('Location access denied. Try searching by city name.')
    );
  }

  function renderAll() {
    if (!weatherData) return;
    const { current, daily, cityName } = weatherData;

    // Header
    document.getElementById('city-display').textContent = cityName;
    const now = new Date();
    document.getElementById('date-display').textContent =
      now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    // Current weather
    const info = wmoInfo(current.weathercode);
    document.getElementById('weather-icon').textContent = info.e;
    document.getElementById('temp-val').textContent = displayTemp(current.temperature_2m);
    document.getElementById('temp-unit-sym').textContent = unitSym();
    document.getElementById('weather-desc').textContent = info.d;

    // Stats
    document.getElementById('feels-like').textContent  = displayTemp(current.apparent_temperature) + unitSym();
    document.getElementById('humidity').textContent     = current.relative_humidity_2m + '%';
    document.getElementById('wind').textContent         = Math.round(current.wind_speed_10m) + ' km/h';
    document.getElementById('pressure').textContent     = Math.round(current.surface_pressure) + ' hPa';
    document.getElementById('uv-index').textContent     = current.uv_index ?? 'N/A';
    document.getElementById('rain').textContent         = (current.precipitation ?? 0) + ' mm';

    // 7-day forecast
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const foreList = document.getElementById('forecast-list');
    foreList.innerHTML = '';
    daily.time.forEach((dateStr, i) => {
      const d    = new Date(dateStr);
      const fi   = wmoInfo(daily.weathercode[i]);
      const hi   = displayTemp(daily.temperature_2m_max[i]);
      const lo   = displayTemp(daily.temperature_2m_min[i]);
      foreList.innerHTML += `
        <div class="forecast-day">
          <div class="fc-day-name">${dayNames[d.getDay()]}</div>
          <div class="fc-icon">${fi.e}</div>
          <div class="fc-temp">${hi}${unitSym()}</div>
          <div class="fc-temp-low">${lo}${unitSym()}</div>
        </div>`;
    });

    showCard(true);
  }

  function setUnit(u) {
    currentUnit = u;
    document.getElementById('btn-c').classList.toggle('active', u === 'C');
    document.getElementById('btn-f').classList.toggle('active', u === 'F');
    renderAll();
  }

  document.getElementById('city-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchCity();
  });

  // Auto-detect on load
  window.onload = detectLocation;
</script>
</body>
</html>
